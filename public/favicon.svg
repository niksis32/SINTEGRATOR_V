<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="S">
  <defs>
    <!-- Объём: свет сверху-слева -->
    <linearGradient id="sFace" x1="18%" y1="12%" x2="82%" y2="88%">
      <stop offset="0%" stop-color="#d4dce8"/>
      <stop offset="35%" stop-color="#8a96ad"/>
      <stop offset="65%" stop-color="#556176"/>
      <stop offset="100%" stop-color="#2c3545"/>
    </linearGradient>
    <!-- Тонкий блик по «ребру» -->
    <linearGradient id="sRim" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Завершённая плавная S: верхняя чаша → переход → нижняя чаша с выходом влево -->
  <g>
    <!-- Нижний слой — имитация задней грани (экструзия) -->
    <path
      fill="none"
      stroke="#0e141f"
      stroke-width="4.8"
      stroke-linecap="round"
      stroke-linejoin="round"
      transform="translate(1.15, 1.2)"
      d="M 22.9 8.4 C 16.1 7.0 11.3 9.7 11.3 13.6 C 11.3 16.1 13.9 17.7 17.9 18.5 C 22.5 19.5 24.9 21.2 24.9 23.7 C 24.9 26.4 20.2 28.2 13.1 27.1"
    />
    <!-- Основной объёмный контур -->
    <path
      fill="none"
      stroke="url(#sFace)"
      stroke-width="4.35"
      stroke-linecap="round"
      stroke-linejoin="round"
      d="M 22.9 8.4 C 16.1 7.0 11.3 9.7 11.3 13.6 C 11.3 16.1 13.9 17.7 17.9 18.5 C 22.5 19.5 24.9 21.2 24.9 23.7 C 24.9 26.4 20.2 28.2 13.1 27.1"
    />
  </g>
  <!-- Лёгкий блик, смещён вверх-влево — усиливает «круглость» штриха -->
  <path
    fill="none"
    stroke="url(#sRim)"
    stroke-width="1.2"
    stroke-linecap="round"
    stroke-linejoin="round"
    transform="translate(-0.55, -0.5)"
    d="M 22.9 8.4 C 16.1 7.0 11.3 9.7 11.3 13.6 C 11.3 16.1 13.9 17.7 17.9 18.5 C 22.5 19.5 24.9 21.2 24.9 23.7 C 24.9 26.4 20.2 28.2 13.1 27.1"
  />
</svg>
